api_version = "2024-04"

# SiGNL Bundle Picker — Theme App Extension
# Provides two surface types:
#   blocks/   — OS 2.0 App Block embedded on product pages (bundle-picker.liquid)
#   sections/ — Full-page theme section (bundle-builder.liquid) for theme-editor-native bundle building
#
# Both surfaces load bundle-picker.js + bundle-picker.css from assets/.

[[extensions]]
type = "theme"
name = "SiGNL Bundle Picker"
handle = "bundle-picker"

# Explicitly declare all directories so Shopify CLI registers blocks, sections, and assets
include_paths = ["blocks/**", "sections/**", "assets/**"]

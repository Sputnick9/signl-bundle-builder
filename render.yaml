services:
  - type: web
    name: signl-bundle-builder
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/auth/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: signl-bundle-builder-db
          property: connectionString

databases:
  - name: signl-bundle-builder-db
    region: oregon
    plan: starter
    databaseName: signl_bundle_builder
    user: signl
